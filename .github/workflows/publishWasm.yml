name: publishWasm
run-name: ${{ github.actor }} Pushed
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: |
          dotnet publish --configuration Release
          cd $GITHUB_WORKSPACE/Wasm/bin/Release/net10.0/publish/wwwroot
          git init
          git add .
          git commit -m "Build $(date)"
          git remote add origin https://Skrywerbeer:$ {{ secrets.PAT }}@github.com/Skrywerbeer/FruitBasketBuild.git
          git push -f